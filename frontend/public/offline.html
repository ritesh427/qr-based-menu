<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2b2118" />
    <title>Saffron Table Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top left, #f5c37a, transparent 30%), #f8f1e7;
        color: #2b2118;
        font-family: Georgia, "Times New Roman", serif;
      }
      main {
        width: min(90vw, 520px);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.76);
        box-shadow: 0 24px 80px rgba(43, 33, 24, 0.16);
        padding: 36px;
      }
      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Saffron Table</p>
      <h1>You are offline</h1>
      <p>The app shell is available, but live menus, carts, orders, and staff updates need the backend connection. Reconnect and refresh to continue.</p>
    </main>
  </body>
</html>
